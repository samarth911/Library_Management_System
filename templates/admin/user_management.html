<h2>User Management</h2>

<h3>Create New User</h3>
<form method="post" action="/admin/create-user">
Username: <input type="text" name="username" required>
Password: <input type="password" name="password" required>
<button type="submit">Create</button>
</form>

<hr>

<h3>Update Existing User</h3>
<form method="post" action="/admin/search-user">
Username: <input type="text" name="username" required>
<button type="submit">Search</button>
</form>

{% if found_user %}
<form method="post" action="/admin/update-user-status">
<input type="hidden" name="username" value="{{ found_user.username }}">

Status:
<input type="radio" name="status" value="ACTIVE" {% if found_user.status=='ACTIVE' %}checked{% endif %}> Active
<input type="radio" name="status" value="BLOCKED" {% if found_user.status=='BLOCKED' %}checked{% endif %}> Blocked

<br><br>
<button type="submit">Update</button>
</form>
{% endif %}

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

{% if message %}
<p style="color:green">{{ message }}</p>
{% endif %}
