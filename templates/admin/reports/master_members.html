<h2>Master List of Members</h2>

<table border="1">
<tr>
<th>Membership No</th>
<th>Name</th>
<th>Phone</th>
<th>Status</th>
<th>Expiry Date</th>
</tr>

{% for m in members %}
<tr>
<td>{{ m.membership_no }}</td>
<td>{{ m.name }}</td>
<td>{{ m.phone }}</td>
<td>{{ m.membership_status }}</td>
<td>{{ m.membership_end_date }}</td>
</tr>
{% endfor %}
</table>
