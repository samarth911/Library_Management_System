{% extends "shared/base.html" %}

{% block content %}

<h2>Issue Book</h2>

<form method="post" action="/confirm-issue">

<input type="hidden" name="copy_id" value="{{ book.copy_id }}">

<table>
<tr><td>Title:</td>
<td><input type="text" value="{{ book.title }}" readonly></td></tr>

<tr><td>Author:</td>
<td><input type="text" value="{{ book.author }}" readonly></td></tr>

<tr><td>Membership No:</td>
<td><input type="text" name="membership_no" required></td></tr>

<tr><td>Issue Date:</td>
<td>
<input type="date" name="issue_date" value="{{ issue_date }}" min="{{ issue_date }}" required>
</td></tr>

<tr><td>Return Date:</td>
<td>
<input type="date" name="return_date" value="{{ return_date }}" max="{{ return_date }}" required>
</td></tr>

<tr><td>Remarks:</td>
<td><input type="text" name="remarks"></td></tr>
</table>

<br>
<button type="submit">Confirm Issue</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% endblock %}
