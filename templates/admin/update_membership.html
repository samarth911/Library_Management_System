<h2>Update Membership</h2>

<form method="post" action="/admin/update-membership">
Membership No: <input type="text" name="membership_no" required>
<button type="submit">Search</button>
</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

{% if member %}
<hr>

<form method="post" action="/admin/update-membership-action">

<input type="hidden" name="membership_no" value="{{ member.membership_no }}">

Name: <input type="text" value="{{ member.name }}" readonly><br><br>
Status: <input type="text" value="{{ member.membership_status }}" readonly><br><br>
Expiry: <input type="date" value="{{ member.membership_end_date }}" readonly><br><br>

Action:<br>
<input type="radio" name="action" value="extend" checked> Extend 6 Months<br>
<input type="radio" name="action" value="cancel"> Cancel Membership<br><br>

<button type="submit">Update</button>

</form>
{% endif %}

{% if message %}
<p style="color:green">{{ message }}</p>
{% endif %}
