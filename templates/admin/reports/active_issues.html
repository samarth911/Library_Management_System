<h2>Active Issues</h2>

<table border="1">
<tr>
<th>Membership No</th>
<th>Name</th>
<th>Book Title</th>
<th>Issue Date</th>
<th>Due Date</th>
</tr>

{% for i in issues %}
<tr>
<td>{{ i.membership_no }}</td>
<td>{{ i.member_name }}</td>
<td>{{ i.title }}</td>
<td>{{ i.issue_date }}</td>
<td>{{ i.due_date }}</td>
</tr>
{% endfor %}
</table>
