<h2>Add Book / Movie</h2>

<form method="post" action="/admin/add-book">

Title: <input type="text" name="title" required><br><br>
Author: <input type="text" name="author" required><br><br>
Publication Year: <input type="number" name="year" required><br><br>
Rack Location: <input type="text" name="rack" required><br><br>

Type:
<input type="radio" name="category" value="BOOK" checked> Book
<input type="radio" name="category" value="MOVIE"> Movie
<br><br>

Serial Number: <input type="text" name="serial" required><br><br>

<button type="submit">Add Item</button>

</form>

{% if message %}
<p style="color:green">{{ message }}</p>
{% endif %}

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}
